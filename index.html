<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>오늘의 단어장</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007AFF; --bg-color: #f2f2f7; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px; }
        
        header { position: sticky; top: 0; background: var(--bg-color); padding: 15px 0; z-index: 100; border-bottom: 0.5px solid #c6c6c8; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        
        .controls { display: flex; gap: 10px; align-items: center; }
        select { flex-grow: 1; padding: 12px; border-radius: 12px; border: 1px solid #d1d1d6; background: white; font-size: 16px; outline: none; -webkit-appearance: none; }
        
        .btn-group { display: flex; gap: 8px; }
        .icon-btn { background: var(--ios-blue); color: white; border: none; width: 44px; height: 44px; border-radius: 12px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(0.9); }
        .icon-btn.sync { background: #34c759; } /* 새로고침은 초록색 */

        .list-container { display: grid; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 35px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .card:active { transform: scale(0.98); background: #fafafa; }

        .check-mark { position: absolute; top: 18px; left: 18px; font-size: 24px; color: #d1d1d6; padding: 5px; z-index: 10; }
        .card.checked .check-mark { color: #ff3b30; }

        .word { font-size: 38px; font-weight: 800; color: #1c1c1e; display: block; word-break: break-all; }
        .details { margin-top: 25px; padding-top: 25px; border-top: 1px solid #f2f2f7; display: none; }
        .card.open .details { display: block; }
        
        .reading { font-size: 17px; color: #8e8e93; margin-bottom: 10px; }
        .meaning { font-size: 24px; color: var(--ios-blue); font-weight: 700; }

        .status-bar { font-size: 12px; color: #8e8e93; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>📚 나의 단어장</h1>
        <div class="btn-group">
            <button class="icon-btn sync" onclick="syncCurrentSheet()" title="새로고침"><i class="fa-solid fa-rotate"></i></button>
            <button class="icon-btn" onclick="shuffleWords()" title="섞기"><i class="fa-solid fa-shuffle"></i></button>
        </div>
    </div>
    <div class="controls">
        <select id="dateSelect" onchange="changeSheet(this.value)">
            <option value="">불러오는 중...</option>
        </select>
    </div>
    <div id="statusBar" class="status-bar"></div>
</header>

<div id="list" class="list-container"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDFQddYbqXTPPmJJe6iL5lECoB4aQeoyZSNRbZDAlB5KnJ_ey0Qk0CkA4MnZuCLd8s/exec";
    
    let currentWords = [];
    let currentSheet = "";

    // 1. 초기화: 시트 목록 로드 (캐시 확인)
    async function init() {
        const cachedList = localStorage.getItem('sheet_list');
        if (cachedList) {
            renderDateSelect(JSON.parse(cachedList));
            updateStatus("시트 목록 로드 완료 (캐시)");
        }
        
        try {
            const res = await fetch(SCRIPT_URL);
            const result = await res.json();
            localStorage.setItem('sheet_list', JSON.stringify(result.data));
            renderDateSelect(result.data);
            updateStatus("최신 목록 업데이트 완료");
        } catch (e) {
            updateStatus("오프라인 모드");
        }
    }

    function renderDateSelect(list) {
        const select = document.getElementById('dateSelect');
        const prevValue = select.value;
        select.innerHTML = '<option value="">복습 날짜 선택</option>';
        list.slice().reverse().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });
        if (prevValue) select.value = prevValue;
    }

    // 2. 시트 선택 시: 캐시 우선 로드 후 백그라운드 업데이트
    async function changeSheet(name) {
        if (!name) return;
        currentSheet = name;
        
        // 1순위: 캐시 데이터 확인 및 렌더링
        const cachedData = localStorage.getItem(`data_${name}`);
        if (cachedData) {
            currentWords = JSON.parse(cachedData);
            render();
            updateStatus(`${name} 로드 완료 (캐시)`);
        } else {
            document.getElementById('list').innerHTML = '<div style="text-align:center; padding:50px; color:#8e8e93;">데이터를 처음 가져오는 중...</div>';
        }

        // 2순위: 백그라운드에서 서버 데이터 가져오기 (자동 업데이트는 선택사항, 여기선 수동 권장)
        if (!cachedData) syncCurrentSheet();
    }

    // 3. 현재 시트 강제 동기화 (새로고침 버튼)
    async function syncCurrentSheet() {
        if (!currentSheet) return;
        updateStatus("서버와 동기화 중...");
        try {
            const res = await fetch(`${SCRIPT_URL}?sheetName=${encodeURIComponent(currentSheet)}`);
            const result = await res.json();
            currentWords = result.data;
            localStorage.setItem(`data_${currentSheet}`, JSON.stringify(result.data));
            render();
            updateStatus("동기화 완료");
        } catch (e) {
            updateStatus("동기화 실패");
        }
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        currentWords.forEach((item) => {
            const isChecked = localStorage.getItem(`check_${currentSheet}_${item.word}`) === "true";
            const card = document.createElement('div');
            card.className = `card ${isChecked ? 'checked' : ''}`;
            card.innerHTML = `
                <div class="check-mark" onclick="toggleCheck(event, '${item.word}', this)">
                    <i class="fa-${isChecked ? 'solid' : 'regular'} fa-circle-check"></i>
                </div>
                <div onclick="this.parentElement.classList.toggle('open')">
                    <span class="word">${item.word}</span>
                    <div class="details">
                        <div class="reading">${item.reading || ''}</div>
                        <div class="meaning">${item.meaning}</div>
                    </div>
                </div>
            `;
            listDiv.appendChild(card);
        });
        window.scrollTo(0, 0);
    }

    function shuffleWords() {
        if (currentWords.length === 0) return;
        for (let i = currentWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentWords[i], currentWords[j]] = [currentWords[j], currentWords[i]];
        }
        render();
    }

    function toggleCheck(event, word, element) {
        event.stopPropagation();
        const card = element.parentElement;
        const key = `check_${currentSheet}_${word}`;
        const isChecked = card.classList.toggle('checked');
        if (isChecked) {
            localStorage.setItem(key, "true");
            element.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else {
            localStorage.removeItem(key);
            element.innerHTML = '<i class="fa-regular fa-circle-check"></i>';
        }
    }

    function updateStatus(msg) {
        document.getElementById('statusBar').innerText = msg;
    }

    init();
</script>
</body>
</html>
