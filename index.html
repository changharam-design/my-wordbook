<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나만의 단어장</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007AFF; --bg-color: #f2f2f7; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px; }
        
        /* 상단 고정 헤더 */
        header { position: sticky; top: 0; background: var(--bg-color); padding: 15px 0; z-index: 100; border-bottom: 0.5px solid #c6c6c8; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        
        /* 컨트롤 섹션 (선택 & 섞기) */
        .controls { display: flex; gap: 10px; align-items: center; }
        select { flex-grow: 1; padding: 12px; border-radius: 12px; border: 1px solid #d1d1d6; background: white; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; }
        .shuffle-btn { background: var(--ios-blue); color: white; border: none; width: 44px; height: 44px; border-radius: 12px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .shuffle-btn:active { transform: scale(0.9); }

        /* 단어 카드 리스트 */
        .list-container { display: grid; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 35px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .card:active { background: #fafafa; transform: scale(0.98); }

        /* 미암기 체크 표시 (상단 왼쪽) */
        .check-mark { position: absolute; top: 18px; left: 18px; font-size: 24px; color: #d1d1d6; padding: 5px; z-index: 10; }
        .card.checked .check-mark { color: #ff3b30; } /* 체크 시 빨간색 강조 */

        /* A열: 단어 (크고 굵게) */
        .word { font-size: 38px; font-weight: 800; color: #1c1c1e; display: block; word-break: break-all; line-height: 1.2; }
        
        /* B/C열: 독음/뜻 (클릭 시 노출) */
        .details { margin-top: 25px; padding-top: 25px; border-top: 1px solid #f2f2f7; display: none; }
        .card.open .details { display: block; animation: slideUp 0.3s ease-out; }
        
        .reading { font-size: 17px; color: #8e8e93; margin-bottom: 10px; }
        .meaning { font-size: 24px; color: var(--ios-blue); font-weight: 700; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; color: #8e8e93; padding: 60px 20px; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>📚 나의 단어장</h1>
        <button class="shuffle-btn" onclick="shuffleWords()" title="단어 순서 섞기">
            <i class="fa-solid fa-shuffle"></i>
        </button>
    </div>
    <div class="controls">
        <select id="dateSelect" onchange="changeSheet(this.value)">
            <option value="">불러오는 중...</option>
        </select>
    </div>
</header>

<div id="list" class="list-container">
    <div class="loading">날짜를 선택해 복습을 시작하세요.</div>
</div>

<script>
    // 🔗 사용자님의 최신 Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDFQddYbqXTPPmJJe6iL5lECoB4aQeoyZSNRbZDAlB5KnJ_ey0Qk0CkA4MnZuCLd8s/exec";
    
    let currentWords = [];
    let currentSheet = "";

    // 1. 날짜(시트 탭) 목록 불러오기
    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            const result = await res.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = '<option value="">복습 날짜 선택</option>';
            
            // 시트 목록을 최신순(역순)으로 표시
            result.data.reverse().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error(e);
            document.querySelector('.loading').innerText = "데이터 연결 실패. 주소를 확인해주세요.";
        }
    }

    // 2. 특정 날짜 선택 시 단어 로드
    async function changeSheet(name) {
        if (!name) return;
        currentSheet = name;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<div class="loading">데이터 로딩 중...</div>';
        
        try {
            const res = await fetch(`${SCRIPT_URL}?sheetName=${encodeURIComponent(name)}`);
            const result = await res.json();
            currentWords = result.data;
            render();
        } catch (e) {
            listDiv.innerHTML = '<div class="loading">데이터를 가져오지 못했습니다.</div>';
        }
    }

    // 3. 단어 카드 리스트 화면 그리기
    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        
        currentWords.forEach((item) => {
            const isChecked = getCheckStatus(item.word);
            const card = document.createElement('div');
            card.className = `card ${isChecked ? 'checked' : ''}`;
            
            card.innerHTML = `
                <div class="check-mark" onclick="toggleCheck(event, '${item.word}', this)">
                    <i class="fa-${isChecked ? 'solid' : 'regular'} fa-circle-check"></i>
                </div>
                <div onclick="this.parentElement.classList.toggle('open')">
                    <span class="word">${item.word}</span>
                    <div class="details">
                        <div class="reading">${item.reading || ''}</div>
                        <div class="meaning">${item.meaning}</div>
                    </div>
                </div>
            `;
            listDiv.appendChild(card);
        });
        window.scrollTo(0, 0);
    }

    // 4. 단어 랜덤 섞기 (Shuffle)
    function shuffleWords() {
        if (currentWords.length === 0) return;
        for (let i = currentWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentWords[i], currentWords[j]] = [currentWords[j], currentWords[i]];
        }
        render();
    }

    // 5. 체크 표시 토글 및 저장 (LocalStorage)
    function toggleCheck(event, word, element) {
        event.stopPropagation(); // 카드 열림 방지
        const card = element.parentElement;
        const key = `check_${currentSheet}_${word}`;
        
        const isChecked = card.classList.toggle('checked');
        if (isChecked) {
            localStorage.setItem(key, "true");
            element.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else {
            localStorage.removeItem(key);
            element.innerHTML = '<i class="fa-regular fa-circle-check"></i>';
        }
    }

    // 6. 저장된 체크 상태 불러오기
    function getCheckStatus(word) {
        return localStorage.getItem(`check_${currentSheet}_${word}`) === "true";
    }

    init();
</script>

</body>
</html>
