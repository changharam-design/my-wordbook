<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgwssWklL8xlWb972-hPQ6jfU5AK0jASI6BZfBAAISEs8AiUN_lhBE972osAom5lx0/exec";
    
    let sheetList = [], currentWords = [], currentSheetName = "";

    async function init() {
        const cached = localStorage.getItem('sheet_list');
        if (cached) renderFolderGrid(JSON.parse(cached));
        try {
            const res = await fetch(SCRIPT_URL);
            const result = await res.json();
            sheetList = result.data;
            localStorage.setItem('sheet_list', JSON.stringify(sheetList));
            renderFolderGrid(sheetList);
        } catch (e) { console.log("Offline"); }
        setupSwipeBack();
    }

    function renderFolderGrid(list) {
        const grid = document.getElementById('folderGrid');
        const achievementArea = document.getElementById('achievementArea');
        grid.innerHTML = '';
        
        let totalLearnedCount = 0; // 체크 안 된(아는) 단어 총합
        const unknownWords = []; // 오늘의 단어용 체크된(모르는) 리스트

        list.forEach(s => {
            const data = JSON.parse(localStorage.getItem(`data_${s}`) || "[]");
            data.forEach(item => {
                const count = getCount(s, item.word);
                if (count === 0) {
                    totalLearnedCount++; // 체크 안 됨 = 외운 단어
                } else {
                    unknownWords.push({...item, originSheet: s}); // 체크 됨 = 모르는 단어
                }
            });
        });

        // 1. 성취감 문구 표시 (체크 안 된 단어 수)
        achievementArea.innerHTML = `
            <div class="achievement-text">
                총 <span class="achievement-count">${totalLearnedCount}</span>개의 단어를 외웠습니다! 🎉
            </div>
        `;

        // 2. 오늘의 단어 카드 생성 (모르는 단어 위주)
        const todayWords = getTodayWords(unknownWords);
        const todayCard = document.createElement('div');
        todayCard.className = 'folder-card today';
        todayCard.onclick = () => openSpecialSheet("TODAY", todayWords, "📅 오늘의 단어");
        todayCard.innerHTML = `<span class="folder-icon">📅</span><div class="folder-name">오늘의 단어</div><div class="folder-stats" style="color:var(--ios-green)">모르는 단어 중 50개 선별</div>`;
        grid.appendChild(todayCard);

        // 3. 단어장 목록
        list.slice().reverse().forEach(name => {
            const stats = getSheetStats(name);
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.onclick = () => openSheet(name);
            // 폴더 통계도 (체크 안 된 단어 / 전체 단어)로 표시
            card.innerHTML = `<span class="folder-icon">📓</span><div class="folder-name">${name}</div><div class="folder-stats">${stats.learned} / ${stats.total}</div>`;
            grid.appendChild(card);
        });
    }

    function getTodayWords(allUnknown) {
        const todayStr = new Date().toISOString().slice(0, 10);
        const seed = todayStr.split('-').join(''); 
        let seededWords = [...allUnknown];
        let m = seededWords.length, t, i, s = parseInt(seed);
        while (m) {
            i = Math.floor((Math.abs(Math.sin(s++)) * 10000) % m--);
            t = seededWords[m]; seededWords[m] = seededWords[i]; seededWords[i] = t;
        }
        return seededWords.slice(0, 50);
    }

    function getSheetStats(sheetName) {
        const data = JSON.parse(localStorage.getItem(`data_${sheetName}`) || "[]");
        let learned = 0;
        data.forEach(item => { if (getCount(sheetName, item.word) === 0) learned++; });
        return { learned, total: data.length };
    }

    // ... (이하 sync, renderWords 등 로직은 동일)
    async function openSheet(name) {
        currentSheetName = name;
        document.getElementById('detailTitle').innerText = name;
        document.getElementById('screenDetail').classList.add('active');
        const cached = localStorage.getItem(`data_${name}`);
        if (cached) { currentWords = JSON.parse(cached); renderWords(); } 
        else { syncCurrentSheet(); }
    }

    function openSpecialSheet(type, words, title) {
        currentSheetName = type;
        currentWords = words;
        document.getElementById('detailTitle').innerText = title;
        document.getElementById('screenDetail').classList.add('active');
        renderWords();
    }

    function renderWords() {
        const listDiv = document.getElementById('wordList');
        listDiv.innerHTML = '';
        currentWords.forEach(item => {
            const sheetName = (currentSheetName === "TODAY") ? item.originSheet : currentSheetName;
            const count = getCount(sheetName, item.word);
            const card = document.createElement('div');
            card.className = `word-card ${count >= 5 ? 'lvl-5' : count >= 3 ? 'lvl-3' : count >= 1 ? 'lvl-1' : ''}`;
            
            const readingHtml = (item.reading && item.reading.toString().trim() !== "") ? `<div class="reading">${item.reading}</div>` : '';
            const exampleHtml = (item.example && item.example.toString().trim() !== "") ? `<div class="example-box"><span class="example-label">Example</span>${item.example}</div>` : '';

            card.innerHTML = `
                <div class="side-btn"><i class="${count > 0 ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'}"></i><span class="count-num">${count > 0 ? count : ''}</span></div>
                <div class="content-area">
                    <span class="word-text">${item.word}</span>
                    <div class="details">
                        ${readingHtml}
                        <div class="meaning">${item.meaning}</div>
                        ${exampleHtml}
                    </div>
                </div>`;
            
            const sBtn = card.querySelector('.side-btn'), cArea = card.querySelector('.content-area');
            let timer;
            sBtn.addEventListener('touchstart', (e) => {
                timer = setTimeout(() => { resetCount(sheetName, item.word); if(window.navigator.vibrate) window.navigator.vibrate(60); timer = null; }, 700);
            }, { passive: true });
            sBtn.addEventListener('touchend', () => { if (timer) { clearTimeout(timer); incrementCount(sheetName, item.word); } });
            cArea.addEventListener('click', () => { card.classList.toggle('open'); });
            listDiv.appendChild(card);
        });
        updateStatsUI();
    }

    function updateStatsUI() {
        if (currentSheetName === "TODAY") document.getElementById('detailStats').innerText = "";
        else { const stats = getSheetStats(currentSheetName); document.getElementById('detailStats').innerText = `${stats.learned}/${stats.total}`; }
    }

    function getCount(sheet, word) { return parseInt(localStorage.getItem(`cnt_${sheet}_${word}`) || "0"); }
    function incrementCount(sheet, word) { localStorage.setItem(`cnt_${sheet}_${word}`, getCount(sheet, word) + 1); renderWords(); }
    function resetCount(sheet, word) { localStorage.removeItem(`cnt_${sheet}_${word}`); renderWords(); }

    function sortUnlearned() {
        currentWords.sort((a, b) => {
            const aS = (currentSheetName === "TODAY") ? a.originSheet : currentSheetName;
            const bS = (currentSheetName === "TODAY") ? b.originSheet : currentSheetName;
            const aC = getCount(aS, a.word) > 0 ? 1 : 0, bC = getCount(bS, b.word) > 0 ? 1 : 0;
            return bC - aC;
        });
        renderWords();
    }

    function setupSwipeBack() {
        let startX = 0; const detail = document.getElementById('screenDetail');
        detail.addEventListener('touchstart', (e) => { startX = e.touches[0].pageX; });
        detail.addEventListener('touchmove', (e) => { let moveX = e.touches[0].pageX - startX; if (startX < 50 && moveX > 0) detail.style.transform = `translateX(${moveX}px)`; });
        detail.addEventListener('touchend', (e) => { let moveX = e.changedTouches[0].pageX - startX; if (startX < 50 && moveX > 100) { detail.classList.remove('active'); renderFolderGrid(sheetList); } detail.style.transform = ''; });
    }

    async function syncCurrentSheet() {
        if(currentSheetName === "TODAY") return;
        const syncBtn = document.querySelector('.icon-btn.sync');
        syncBtn.style.opacity = '0.5';
        try {
            localStorage.removeItem(`data_${currentSheetName}`);
            const res = await fetch(`${SCRIPT_URL}?sheetName=${encodeURIComponent(currentSheetName)}&v=${Date.now()}`);
            const result = await res.json();
            currentWords = result.data;
            localStorage.setItem(`data_${currentSheetName}`, JSON.stringify(currentWords));
            alert("동기화 완료!");
            renderWords();
        } catch (e) { alert("동기화 실패"); } finally { syncBtn.style.opacity = '1'; }
    }

    function shuffleWords() { currentWords.sort(() => Math.random() - 0.5); renderWords(); }
    init();
</script>
