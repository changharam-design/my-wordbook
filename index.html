<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>오늘의 단어장</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007AFF; --bg-color: #f2f2f7; --card-bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px; }
        
        /* 헤더 섹션 */
        header { position: sticky; top: 0; background: var(--bg-color); padding: 15px 0; z-index: 100; border-bottom: 0.5px solid #c6c6c8; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        
        /* 컨트롤 섹션 */
        .controls { display: flex; gap: 10px; align-items: center; }
        select { flex-grow: 1; padding: 10px; border-radius: 12px; border: 1px solid #d1d1d6; background: white; font-size: 16px; outline: none; }
        .shuffle-btn { background: var(--ios-blue); color: white; border: none; width: 44px; height: 44px; border-radius: 12px; font-size: 18px; cursor: pointer; transition: transform 0.1s; }
        .shuffle-btn:active { transform: scale(0.9); }

        /* 단어 카드 리스트 */
        .list-container { display: grid; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; cursor: pointer; transition: all 0.2s; }
        .card:active { background: #fafafa; }

        /* 체크박스 스타일 */
        .check-mark { position: absolute; top: 15px; left: 15px; font-size: 22px; color: #d1d1d6; padding: 5px; }
        .card.checked .check-mark { color: #ff3b30; } /* 체크 시 빨간색 */

        /* 단어 텍스트 */
        .word { font-size: 36px; font-weight: 800; color: #1c1c1e; display: block; word-break: break-all; }
        
        /* 상세 정보 (독음/뜻) */
        .details { margin-top: 25px; padding-top: 20px; border-top: 1px solid #f2f2f7; display: none; }
        .card.open .details { display: block; animation: slideUp 0.3s ease-out; }
        
        .reading { font-size: 16px; color: #8e8e93; margin-bottom: 8px; }
        .meaning { font-size: 22px; color: var(--ios-blue); font-weight: 700; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { text-align: center; color: #8e8e93; padding: 50px; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>📚 나의 단어장</h1>
        <button class="shuffle-btn" onclick="shuffleWords()" title="단어 섞기">
            <i class="fa-solid fa-shuffle"></i>
        </button>
    </div>
    <div class="controls">
        <select id="dateSelect" onchange="changeSheet(this.value)">
            <option value="">날짜 선택 중...</option>
        </select>
    </div>
</header>

<div id="list" class="list-container">
    <div class="loading">날짜를 선택하면 단어장이 열립니다.</div>
</div>

<script>
    // ⚠️ 본인의 구글 웹 앱 URL을 여기에 붙여넣으세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOJL8pofZ1opoRDrrEUpMhsuXZsiXwSZ10CQgtevOgIpMcYqUXMosHis_w9Tc1rZrL/exec";
    
    let currentWords = [];
    let currentSheet = "";

    // 1. 날짜(시트) 목록 불러오기
    async function init() {
        try {
            const res = await fetch(https://script.google.com/macros/s/AKfycbwDFQddYbqXTPPmJJe6iL5lECoB4aQeoyZSNRbZDAlB5KnJ_ey0Qk0CkA4MnZuCLd8s/exec);
            const result = await res.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = '<option value="">복습할 날짜 선택</option>';
            
            result.data.reverse().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
        } catch (e) {
            alert("데이터를 불러오지 못했습니다.");
        }
    }

    // 2. 시트 변경 시 단어 로드
    async function changeSheet(name) {
        if (!name) return;
        currentSheet = name;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<div class="loading">단어를 불러오는 중...</div>';
        
        try {
            const res = await fetch(`${SCRIPT_URL}?sheetName=${encodeURIComponent(name)}`);
            const result = await res.json();
            currentWords = result.data;
            render();
        } catch (e) {
            listDiv.innerHTML = '<div class="loading">에러가 발생했습니다.</div>';
        }
    }

    // 3. 화면 그리기
    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        
        currentWords.forEach((item, index) => {
            const isChecked = getCheckStatus(item.word);
            const card = document.createElement('div');
            card.className = `card ${isChecked ? 'checked' : ''}`;
            
            card.innerHTML = `
                <div class="check-mark" onclick="toggleCheck(event, '${item.word}', this)">
                    <i class="fa-${isChecked ? 'solid' : 'regular'} fa-circle-check"></i>
                </div>
                <div onclick="this.parentElement.classList.toggle('open')">
                    <span class="word">${item.word}</span>
                    <div class="details">
                        <div class="reading">${item.reading}</div>
                        <div class="meaning">${item.meaning}</div>
                    </div>
                </div>
            `;
            listDiv.appendChild(card);
        });
        window.scrollTo(0, 0);
    }

    // 4. 단어 섞기 (Fisher-Yates 알고리즘)
    function shuffleWords() {
        if (currentWords.length === 0) return;
        for (let i = currentWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentWords[i], currentWords[j]] = [currentWords[j], currentWords[i]];
        }
        render();
    }

    // 5. 체크 표시 저장 및 토글
    function toggleCheck(event, word, element) {
        event.stopPropagation(); // 카드 열리는 이벤트 방지
        const card = element.parentElement;
        const key = `check_${currentSheet}_${word}`; // 시트별 단어 고유 키
        
        const isChecked = card.classList.toggle('checked');
        if (isChecked) {
            localStorage.setItem(key, "true");
            element.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else {
            localStorage.removeItem(key);
            element.innerHTML = '<i class="fa-regular fa-circle-check"></i>';
        }
    }

    // 6. 체크 상태 불러오기
    function getCheckStatus(word) {
        return localStorage.getItem(`check_${currentSheet}_${word}`) === "true";
    }

    // 시작
    init();
</script>

</body>
</html>
